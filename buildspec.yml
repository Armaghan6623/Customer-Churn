version: 0.2
phases:
  install:
    runtime-versions:
      python: 3.9
  build:
    commands:
      - echo Building Docker Image...
      - docker build -t churn-app .

# 3. Add a placeholder to the models folder so Git can "see" it
!touch models/.gitkeep

# 4. Final Sync: Add, Commit, and Push
!git add buildspec.yml models/.gitkeep
!git commit -m "feat: add buildspec for AWS and models directory placeholder"
!git push origin main
