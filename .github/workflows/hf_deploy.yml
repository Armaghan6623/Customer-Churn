name: Production Deployment Pipeline to Hugging Face Spaces

on:
  push:
    branches: [ master ]

jobs:
  deploy-to-space:
    runs-on: ubuntu-latest
    steps:
      - name: Ingest Source Code Repository Files
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy Sub-Folder Directly to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_SPACE_DEPLOY_TOKEN }}
        run: |
          # 1. Initialize global git configs inside the runner
          git config --global user.email "actions@github.com"
          git config --global user.name "Automated-GitHub-Actions-Runner"
          
          # 2. Step completely inside your app directory
          cd customer_churn_saas
          
          # 3. Initialize a clean, independent git instance for Hugging Face
          git init -b main
          git add .
          git commit -m "production: deploy autonomous level-2 platform"
          
          # 4. Force push directly over to your target Space
          # (Ensure 'Armaghan6623' matches your exact Hugging Face profile username capitalization)
          git remote add space https://Armaghan6623:$HF_TOKEN@huggingface.co/spaces/Armaghan6623/customer-churn-mlops
          git push --force space main