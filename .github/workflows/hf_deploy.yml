name: Deploy Docker Streamlit app to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - "customer crunch/**"
      - ".github/workflows/hf_deploy.yml"
  workflow_dispatch:

concurrency:
  group: hf-space-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage Space bundle (app + ML modules + artifacts)
        shell: bash
        run: |
          set -euo pipefail
          APP_DIR="customer crunch/customer_churn_saas"
          mkdir -p "${APP_DIR}/saved_models"

          for artifact in \
            churn_pipeline.joblib \
            forecast_model.joblib \
            xgb_forecast_model.joblib \
            forecast_plot.png
          do
            src="customer crunch/saved_models/${artifact}"
            dst="${APP_DIR}/saved_models/${artifact}"
            if [ -f "${src}" ]; then
              cp "${src}" "${dst}"
              echo "Copied ${src} -> ${dst}"
            fi
          done

          cp -r "customer crunch/classification" "${APP_DIR}/"
          cp -r "customer crunch/forecasting" "${APP_DIR}/"
          cp "customer crunch/monthly_churn_trends.csv" "${APP_DIR}/" 2>/dev/null \
            || cp "customer crunch/data/raw/monthly_churn_trends.csv" "${APP_DIR}/monthly_churn_trends.csv"

          find "${APP_DIR}" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          find "${APP_DIR}" -name "*.pyc" -delete 2>/dev/null || true

      - name: Upload app subtree to Hugging Face Space
        uses: Custom-Ink/huggingface-spaces-upload-action@v2
        with:
          hf_username: "MuhammadArmaghan"
          space_name: "customer-crunch"
          hf_access_token: ${{ secrets.HF_SPACE_DEPLOY_TOKEN }}
          source_directory: "customer crunch/customer_churn_saas"
