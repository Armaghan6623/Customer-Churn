name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image (sanity check)
        run: docker build -t hf-space:latest .

      - name: Restart Space (rebuild with latest repo)
        env:
          HF_TOKEN: ${{ secrets.HF_SPACE_DEPLOY_TOKEN }}
          SPACE_ID: ${{ vars.HF_SPACE_ID }}
          SPACE_ID_SECRET: ${{ secrets.HF_SPACE_ID }}
        run: |
          python - <<'PY'
          import os
          import sys
          from urllib.error import HTTPError
          from urllib.parse import quote
          from urllib.request import Request, urlopen

          token = os.environ.get("HF_TOKEN")
          space_id = (os.environ.get("SPACE_ID") or os.environ.get("SPACE_ID_SECRET") or "").strip()

          if not token:
              print("Missing secret HF_SPACE_DEPLOY_TOKEN", file=sys.stderr)
              sys.exit(1)
          if not space_id:
              print(
                  "Missing HF Space id. Set repository variable HF_SPACE_ID "
                  "or secret HF_SPACE_ID (e.g. your-username/customer-churn).",
                  file=sys.stderr,
              )
              sys.exit(1)

          encoded = quote(space_id, safe="/")
          url = f"https://huggingface.co/api/spaces/{encoded}/restart"
          req = Request(
              url,
              method="POST",
              headers={"Authorization": f"Bearer {token}"},
          )

          try:
              with urlopen(req, timeout=60) as resp:
                  print(f"Space restart triggered for {space_id}: HTTP {resp.status}")
          except HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print(f"Restart failed: HTTP {e.code} {body}", file=sys.stderr)
              sys.exit(1)
          PY
